version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:5.7
    container_name: smartfarmer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DB:-smart_farming}
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/complete_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfarmer-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartfarmer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfarmer-network

  # Backend Flask API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartfarmer-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DB: ${MYSQL_DB:-smart_farming}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_PORT: 5000
      SMTP_EMAIL: ${SMTP_EMAIL}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAZORPAY_KEY: ${RAZORPAY_KEY}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://frontend:3000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - smartfarmer-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartfarmer-frontend
    environment:
      REACT_APP_API_URL: http://backend:5000/api
      REACT_APP_SOCKET_URL: http://backend:5000
      REACT_APP_FIREBASE_API_KEY: ${REACT_APP_FIREBASE_API_KEY}
      REACT_APP_FIREBASE_AUTH_DOMAIN: ${REACT_APP_FIREBASE_AUTH_DOMAIN}
      REACT_APP_FIREBASE_PROJECT_ID: ${REACT_APP_FIREBASE_PROJECT_ID}
      REACT_APP_RAZORPAY_KEY: ${REACT_APP_RAZORPAY_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - smartfarmer-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: smartfarmer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - smartfarmer-network
    restart: unless-stopped
    profiles: ["production"]

volumes:
  mysql_data:
  redis_data:

networks:
  smartfarmer-network:
    driver: bridge
